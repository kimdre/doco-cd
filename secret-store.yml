stores:
  bitwarden-login:
    version: v1
    url: "http://bitwarden-cli:8087/object/item/{{ .remoteRef.key }}"
    method: GET
    headers:
      Content-Type: application/json
    jsonPath: "$.data.login.{{ .remoteRef.property }}"

  bitwarden-fields:
    version: v1
    url: "http://bitwarden-cli:8087/object/item/{{ .remoteRef.key }}"
    method: GET
    jsonPath: "$.data.fields[?@.name==\"{{ .remoteRef.property }}\"].value"