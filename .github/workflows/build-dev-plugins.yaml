name: Build Dev Plugin Images

permissions:
  contents: read
  id-token: write
  packages: write
  security-events: write
  actions: read

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*'

jobs:
  discover-plugins:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.discover.outputs.plugins }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Discover secret-provider plugins
        id: discover
        shell: bash
        run: |
          plugins=$(python3 - <<'PY'
          import json
          import os

          base = "cmd/secretproviders"
          plugins = sorted(
              d for d in os.listdir(base)
              if os.path.isdir(os.path.join(base, d)) and d != "internal"
          )
          print(json.dumps(plugins))
          PY
          )
          echo "plugins=${plugins}" >> "$GITHUB_OUTPUT"

  build:
    needs: discover-plugins
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.plugins) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract metadata for the Docker image
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            ghcr.io/${{ github.repository }}-secretprovider-${{ matrix.plugin }}
          tags: |
            type=raw,value=dev

      - name: Set short Git commit SHA
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short ${{ github.sha }})
          echo "short_sha=$calculatedSha" >> $GITHUB_OUTPUT

      - name: Build and export to local Docker
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: cmd/secretproviders/${{ matrix.plugin }}/Dockerfile
          platforms: linux/amd64
          build-args: |
            APP_VERSION=dev-build.${{ steps.vars.outputs.short_sha }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=plugin-${{ matrix.plugin }}
          cache-to: type=gha,mode=max,scope=plugin-${{ matrix.plugin }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: 'ghcr.io/${{ github.repository }}-secretprovider-${{ matrix.plugin }}:dev'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.plugin }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          sarif_file: 'trivy-results-${{ matrix.plugin }}.sarif'
          category: secretprovider-${{ matrix.plugin }}

      - name: Push dev image
        shell: bash
        if: "${{ github.event_name != 'pull_request' }}"
        run: |
          set -ex
          docker push ${{ steps.meta.outputs.tags }}
