name: Add new issues to project

on:
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: read

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project dashboard
        uses: actions/add-to-project@244f685bbc3b7adfa8466e08b698b5577571133e # v1.0.2
        with:
          project-url: https://github.com/users/kimdre/projects/3
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
