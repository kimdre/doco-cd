name: Add new issues to project

on:
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: read

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project dashboard
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd # v2.0.0
        with:
          project-url: https://github.com/users/kimdre/projects/3
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
