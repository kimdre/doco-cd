name: Tests

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags-ignore:
      - '*'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    name: Evaluate changed paths
    runs-on: ubuntu-latest
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5.3.1
        with:
          paths_filter: |
            test:
              paths_ignore:
                - 'wiki/**'
                - 'LICENSE'
                - '**/*.md'
                - 'renovate.json'

  codespell:
    name: Check for spelling errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive
      - uses: codespell-project/actions-codespell@406322ec52dd7b488e48c1c4b82e2a8b3a1bf630 # v2
        with:
          check_filenames: true
          skip: ./.git,go.mod,go.sum
          ignore_words_list: AtLeast,AtMost

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.should_skip != 'true' && !fromJSON(needs.changes.outputs.paths_result).test.should_skip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - name: Run linters
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        mode: [standalone, swarm]

    services:
      squid-proxy:
        image: ubuntu/squid:latest@sha256:6a097f68bae708cedbabd6188d68c7e2e7a38cedd05a176e1cc0ba29e3bbe029
        ports:
          - 3128:3128

    steps:
      - if: needs.changes.outputs.should_skip != 'true' && !fromJSON(needs.changes.outputs.paths_result).test.should_skip
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - if: needs.changes.outputs.should_skip != 'true' && !fromJSON(needs.changes.outputs.paths_result).test.should_skip
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - if: needs.changes.outputs.should_skip != 'true' && !fromJSON(needs.changes.outputs.paths_result).test.should_skip
        name: Install packages
        run: |
          sudo apt install -y musl-tools
      - if: needs.changes.outputs.should_skip != 'true' && !fromJSON(needs.changes.outputs.paths_result).test.should_skip
        run: go mod download
      - if: needs.changes.outputs.should_skip != 'true' && !fromJSON(needs.changes.outputs.paths_result).test.should_skip
        run: if [ "${{ matrix.mode }}" = "swarm" ]; then docker swarm init; fi
      - if: needs.changes.outputs.should_skip != 'true' && !fromJSON(needs.changes.outputs.paths_result).test.should_skip
        run: go test -ldflags="$BW_SDK_BUILD_FLAGS" -v -coverprofile=coverage-${{ matrix.mode }}.out -covermode=atomic -timeout 20m ./...
        timeout-minutes: 20
        env:
          WEBHOOK_SECRET: test_Secret1
          API_SECRET: api_Secret1
          GIT_ACCESS_TOKEN: ${{ secrets.GIT_ACCESS_TOKEN }}
          HTTP_PROXY: http://localhost:3128
          SOPS_AGE_KEY: ${{ vars.SOPS_AGE_KEY }} # used to encrypt/decrypt files in internal/encryption/testdata
          # Required for Bitwarden Go SDK, see CONTRIBUTING.md
          CGO_ENABLED: 1
          CC: musl-gcc
          BW_SDK_BUILD_FLAGS: "-linkmode external -extldflags '-static -Wl,-unresolved-symbols=ignore-all'"
      - if: needs.changes.outputs.should_skip != 'true' && !fromJSON(needs.changes.outputs.paths_result).test.should_skip
        name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-${{ matrix.mode }}.out
          flags: unittests
