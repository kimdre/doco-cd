syntax = "proto3";

package secretprovider.v1;

option go_package = "github.com/kimdre/doco-cd/api/secretprovider/v1;secretproviderv1";

// SecretProvider is the plugin interface for retrieving secret values from
// an external backend.
service SecretProvider {
  // Info returns the provider's identifier and version.
  rpc Info(InfoRequest) returns (InfoResponse);

  // GetSecrets retrieves one or more secret values in a single call.
  rpc GetSecrets(GetSecretsRequest) returns (GetSecretsResponse);

  // ResolveSecretReferences resolves a map of environment-variable names to
  // secret references, returning the resolved values keyed by the same
  // environment-variable names.
  rpc ResolveSecretReferences(ResolveSecretReferencesRequest) returns (ResolveSecretReferencesResponse);
}

message InfoRequest {}

message InfoResponse {
  string name = 1;
  string version = 2;
}

message GetSecretsRequest {
  repeated string ids = 1;
}

message GetSecretsResponse {
  map<string, string> secrets = 1;
}

message ResolveSecretReferencesRequest {
  map<string, string> secrets = 1;
}

message ResolveSecretReferencesResponse {
  map<string, string> secrets = 1;
}
