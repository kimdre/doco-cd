services:
  bitwarden-api:
    image: ghcr.io/kimdre/bitwarden-rest-api-server:latest
    # Specify sensitive environment variables in a .env file
    environment:
      - BW_HOST=${BW_HOST:-https://vault.bitwarden.com}
      - BW_CLIENTID=${BW_CLIENTID:?error}
      - BW_CLIENTSECRET=${BW_CLIENTSECRET:?error}
      - BW_PASSWORD=${BW_PASSWORD:?error}
    expose:
      - "8087"
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    volumes:
      - bw-data:/data
#    tmpfs:
#      - /data:uid=65532,gid=65532,mode=755
    depends_on:
      set_permissions:
        condition: "service_completed_successfully"
  app:
    environment:
      SECRET_PROVIDER: webhook
      SECRET_PROVIDER_WEBHOOK_STORES_FILE: /secret-store.yml
    volumes:
      - ./internal/secretprovider/webhook/testdata/secret-store.yml:/secret-store.yml:ro
    depends_on:
      bitwarden-api:
        condition: "service_healthy"

  set_permissions:
    image: busybox:latest
    command: sh -c "chown -R 65532:65532 /data"
    volumes:
      - bw-data:/data
    restart: "no"

volumes:
    bw-data: